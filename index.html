<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Portfolio</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #00ffcc, #007acc);
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
        h1 {
            font-size: 2.5em;
            text-shadow: 0 0 10px cyan;
        }
        section {
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 15px rgba(0, 153, 204, 0.3);
        }
        h2 {
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
            text-shadow: 0 0 5px blue;
        }
        .button {
            background-color: #00cc66;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #009933;
        }
        /* Flame animation */
        .flame {
            animation: flicker 1s infinite;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Cyberpunk Portfolio</h1>
    </header>
    <section id="about">
        <h2>About Me</h2>
        <p>Bio goes here...</p>
    </section>
    <section id="projects">
        <h2>Projects</h2>
        <p>List of projects goes here...</p>
    </section>
    <section id="skills">
        <h2>Skills</h2>
        <p>List of skills goes here...</p>
    </section>
    <section id="certifications">
        <h2>Certifications</h2>
        <p>List of certifications goes here...</p>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <p>Contact information goes here...</p>
        <button class="button">Get in Touch</button>
    </section>
</body>
</html>
